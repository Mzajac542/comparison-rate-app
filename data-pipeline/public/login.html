<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie i Rejestracja</title>
    <style>
        body { font-family: sans-serif; background-color: #1e1e1e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        
        /* ✅ Nowe style dla kontenerów inputów */
        .input-group { position: relative; width: 90%; margin: 10px auto; }
        
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #444; 
            border-radius: 4px; 
            background: #1e1e1e; 
            color: white; 
            box-sizing: border-box; /* Zapobiega wychodzeniu inputa poza ramki */
            padding-right: 40px; /* Robi miejsce na ikonkę oka, żeby tekst na nią nie najechał */
        }
        
        /* ✅ Styl dla ikonki oka */
        .eye-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .eye-icon:hover { color: #ccc; }

        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        .btn-login { background: #3b82f6; color: white; }
        .btn-login:hover { background: #2563eb; }
        .btn-register { background: #10b981; color: white; margin-top: 5px; }
        .btn-register:hover { background: #059669; }
        .toggle-text { margin-top: 15px; font-size: 0.9em; cursor: pointer; color: #9ca3af; text-decoration: underline; }
        
        .remember-container { display: flex; align-items: center; justify-content: flex-start; margin-top: 5px; text-align: left; padding-left: 5%; }
        .remember-container input { width: auto; margin-right: 8px; cursor: pointer; }
        .remember-container label { font-size: 0.9em; color: #aaa; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

<div class="panel">
    <h2 id="form-title">Logowanie</h2>
    
    <form onsubmit="event.preventDefault(); submitForm();">
        <div class="input-group">
            <input type="text" id="username" placeholder="Login" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Hasło" required>
            <span class="eye-icon" onclick="togglePassword()">
                <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="eye-closed" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
            </span>
        </div>
        
        <div class="remember-container" id="remember-box">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Nie wylogowuj mnie</label>
        </div>
        
        <button id="action-btn" class="btn-login" type="submit">Zaloguj się</button>
    </form>
    
    <div class="toggle-text" onclick="toggleMode()">Nie masz konta? Zarejestruj się</div>

    <div id="guest-box" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #444;">
        <div class="toggle-text" style="color: #3b82f6; margin-top: 0; text-decoration: none; font-weight: bold;" onclick="continueAsGuest()">
            Kontynuuj jako gość &rarr;
        </div>
    </div>
</div>


<script>
    // ✅ FUNKCJA DO POKAZYWANIA / UKRYWANIA HASŁA
    function togglePassword() {
        const passInput = document.getElementById('password');
        const eyeOpen = document.getElementById('eye-open');
        const eyeClosed = document.getElementById('eye-closed');
        
        if (passInput.type === 'password') {
            passInput.type = 'text'; // Pokazuje znaki
            eyeOpen.style.display = 'none'; // Chowa normalne oko
            eyeClosed.style.display = 'block'; // Pokazuje przekreślone oko
        } else {
            passInput.type = 'password'; // Ukrywa znaki (kropki)
            eyeOpen.style.display = 'block'; // Pokazuje normalne oko
            eyeClosed.style.display = 'none'; // Chowa przekreślone oko
        }
    }

    // Strażnik sprawdzający ciasteczko
    window.onload = async function() {
        try {
            const res = await fetch('/api/me', { credentials: 'include' });
            const data = await res.json();
            
            if (data.loggedIn) {
                if (data.user.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = 'http://localhost:5173';
                }
            }
        } catch (err) {
            console.log("Brak aktywnej sesji, oczekiwanie na logowanie.");
        }
    };

    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? "Logowanie" : "Rejestracja";
        document.getElementById('action-btn').innerText = isLoginMode ? "Zaloguj się" : "Stwórz konto";
        document.getElementById('action-btn').className = isLoginMode ? "btn-login" : "btn-register";
        document.querySelectorAll('.toggle-text').innerText = isLoginMode ? "Nie masz konta? Zarejestruj się" : "Masz już konto? Zaloguj się";
        
        document.getElementById('remember-box').style.display = isLoginMode ? "flex" : "none";
        
        // Ukrywanie opcji gościa podczas rejestracji
        document.getElementById('guest-box').style.display = isLoginMode ? "block" : "none";
    }

    // FUNKCJA PRZEKIEROWANIA DLA GOŚCIA
    function continueAsGuest() {
        window.location.href = 'http://localhost:5173';
    }

    async function submitForm() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const remember = document.getElementById('rememberMe').checked; 
        const endpoint = isLoginMode ? '/api/login' : '/api/register';

        // Prosta walidacja przed wysłaniem
        if (!user || !pass) return;

        const btn = document.getElementById('action-btn');
        const originalText = btn.innerText;
        btn.innerText = "Ładowanie...";
        btn.disabled = true;

        try {
            const res = await fetch(`http://localhost:3001${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ username: user, password: pass, rememberMe: remember }) 
            });

            const data = await res.json();

            if (res.ok) {
                if (isLoginMode) {
                    if (data.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = 'http://localhost:5173'; 
                    }
                } else {
                    alert(data.message);
                    toggleMode();
                }
            } else {
                alert("Błąd: " + data.error);
            }
        } catch (err) {
            alert("❌ Błąd połączenia z serwerem! Sprawdź terminal.");
            console.error("Szczegóły:", err);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
