<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie i Rejestracja</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #1e1e1e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        .input-group { position: relative; width: 90%; margin: 10px auto; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 4px; background: #1e1e1e; color: white; box-sizing: border-box; padding-right: 40px; }
        .eye-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-login { background: #3b82f6; color: white; }
        .btn-register { background: #10b981; color: white; }
        .toggle-text { margin-top: 15px; font-size: 0.9em; cursor: pointer; color: #9ca3af; text-decoration: underline; }
    </style>
</head>
<body>

<div class="panel">
    <h2 id="form-title">Logowanie</h2>
    <form onsubmit="event.preventDefault(); submitForm();">
        <div class="input-group">
            <input type="text" id="username" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Hasło" required>
        </div>
        <button id="action-btn" class="btn-login" type="submit">Zaloguj się</button>
    </form>
    <div class="toggle-text" id="toggle-mode" onclick="toggleMode()">Nie masz konta? Zarejestruj się</div>
</div>

<script>
    // Wpisz tutaj swoje dane z Supabase (Project Settings -> API)
    const supabase = supabase.createClient('TWÓJ_SUPABASE_URL', 'TWÓJ_SUPABASE_ANON_KEY');
    let isLoginMode = true;

    async function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? "Logowanie" : "Rejestracja";
        document.getElementById('action-btn').innerText = isLoginMode ? "Zaloguj się" : "Stwórz konto";
        document.getElementById('toggle-mode').innerText = isLoginMode ? "Nie masz konta? Zarejestruj się" : "Masz już konto? Zaloguj się";
    }

    async function submitForm() {
        const email = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('action-btn');
        btn.disabled = true;

        const { error } = isLoginMode 
            ? await supabase.auth.signInWithPassword({ email, password: pass })
            : await supabase.auth.signUp({ email, password: pass });

        if (error) alert(error.message);
        else {
            if (isLoginMode) window.location.href = '/';
            else alert("Sprawdź email w celu potwierdzenia rejestracji!");
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
